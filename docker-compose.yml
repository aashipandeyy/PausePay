services:
  mysql:
    image: mysql:8.0
    container_name: finance_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: financeautopilot
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.0
    container_name: finance_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data: